<script>
const APPS_SCRIPT_URL = 'YOUR_WEB_APP_URL_HERE';

let state = {};

// Load everything from Apps Script
async function loadFromSheet() {
  showSaveStatus('loading');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();

    if (json.success && json.data) {
      state = json.data || {};

      // Render each section as-is
      renderStats();
      renderTasks();
      renderProjects();
      renderDeliverables();
      renderNotes();

      showSaveStatus('loaded');
    } else {
      showSaveStatus('error');
    }
  } catch (e) {
    showSaveStatus('error');
  }
}

// ── RENDER ──

// Stats: just show whatever fields exist
function renderStats() {
  const stats = state.stats || {};
  for (const key in stats) {
    const el = document.getElementById(`stat-${key}`);
    if (el) el.textContent = stats[key];
  }
}

// Tasks: render everything as-is
function renderTasks() {
  const priorityEl = document.getElementById('priority-tasks');
  const scheduledEl = document.getElementById('scheduled-tasks');
  priorityEl.innerHTML = '';
  scheduledEl.innerHTML = '';

  (state.tasks || []).forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.textContent = JSON.stringify(t); // show full raw object
    if (t.type === 'priority') priorityEl.appendChild(row);
    else scheduledEl.appendChild(row);
  });
}

// Projects: render everything as-is
function renderProjects() {
  const tb = document.getElementById('project-tbody');
  tb.innerHTML = '';
  (state.projects || []).forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${JSON.stringify(p)}</td>`; // raw object in one cell
    tb.appendChild(tr);
  });
}

// Deliverables: render everything as-is
function renderDeliverables() {
  const tb = document.getElementById('deliverable-tbody');
  tb.innerHTML = '';
  (state.deliverables || []).forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${JSON.stringify(d)}</td>`; // raw object in one cell
    tb.appendChild(tr);
  });
}

// Notes: just show last note as-is
function renderNotes() {
  const notesEl = document.getElementById('daily-notes');
  const notes = state.notes || [];
  if (notes.length > 0) notesEl.value = JSON.stringify(notes[notes.length-1]);
}

// Save status
function showSaveStatus(status) {
  const el = document.getElementById('save-status');
  const msgs = { loading: '⏳ Loading…', loaded: '✅ Loaded', error: '⚠️ Load failed' };
  el.textContent = msgs[status] || '';
  el.className = 'save-status ' + status;
  if (status === 'loaded') setTimeout(() => { el.textContent=''; el.className='save-status'; }, 3000);
}

// Date
function setDate() {
  const d = new Date();
  const el = document.getElementById('topbar-date');
  if (el) el.textContent = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

// INITIAL LOAD
setDate();
loadFromSheet();
</script>
