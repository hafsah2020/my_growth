<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raw Apps Script Data Viewer</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
  }

  header {
    background: #222;
    color: #fff;
    padding: 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  main {
    padding: 1rem;
  }

  h2 {
    margin-top: 2rem;
    font-size: 1.2rem;
    color: #333;
  }

  .task-row {
    background: #fff;
    padding: 0.5rem;
    margin-bottom: 0.2rem;
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.9rem;
    word-break: break-word;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.5rem;
  }

  table td, table th {
    border: 1px solid #ccc;
    padding: 0.4rem;
    font-family: monospace;
    font-size: 0.85rem;
  }

  #daily-notes {
    width: 100%;
    height: 150px;
    margin-top: 0.5rem;
    font-family: monospace;
  }

  .save-status {
    font-size: 0.9rem;
    font-weight: bold;
  }

  .save-status.loading { color: orange; }
  .save-status.loaded { color: green; }
  .save-status.error { color: red; }

</style>
</head>
<body>

<header>
  <div>Raw Apps Script Data Viewer</div>
  <div id="topbar-date"></div>
</header>

<main>
  <div class="save-status" id="save-status"></div>

  <!-- STATS -->
  <h2>Stats</h2>
  <div id="stats-container">
    <div>Priority Tasks: <span id="stat-priority"></span></div>
    <div>Scheduled Tasks: <span id="stat-scheduled"></span></div>
    <div>Projects: <span id="stat-projects"></span></div>
    <div>Deliverables: <span id="stat-deliverables"></span></div>
  </div>

  <!-- TASKS -->
  <h2>Priority Tasks</h2>
  <div id="priority-tasks"></div>

  <h2>Scheduled Tasks</h2>
  <div id="scheduled-tasks"></div>

  <!-- PROJECTS -->
  <h2>Projects</h2>
  <table>
    <thead>
      <tr><th>Raw Project Data</th></tr>
    </thead>
    <tbody id="project-tbody"></tbody>
  </table>

  <!-- DELIVERABLES -->
  <h2>Deliverables</h2>
  <table>
    <thead>
      <tr><th>Raw Deliverable Data</th></tr>
    </thead>
    <tbody id="deliverable-tbody"></tbody>
  </table>

  <!-- NOTES -->
  <h2>Last Note</h2>
  <textarea id="daily-notes" readonly></textarea>
</main>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz9uygWsXQ-1w3fxmIxPaLkjOY8Ot_PNdh5aj0i0mEJWDV4Pyt9Y_piHMforupr8GjV6A/exec'; // replace with your Apps Script web app URL
let state = {};

// Load everything from Apps Script
async function loadFromSheet() {
  showSaveStatus('loading');
  try {
    const res = await fetch(APPS_SCRIPT_URL);
    const json = await res.json();

    if (json.success && json.data) {
      state = json.data || {};

      // Render each section as-is
      renderStats();
      renderTasks();
      renderProjects();
      renderDeliverables();
      renderNotes();

      showSaveStatus('loaded');
    } else {
      showSaveStatus('error');
    }
  } catch (e) {
    showSaveStatus('error');
    console.error(e);
  }
}

// ── RENDER ──

// Stats: just show whatever fields exist
function renderStats() {
  const stats = state.stats || {};
  for (const key in stats) {
    const el = document.getElementById(`stat-${key}`);
    if (el) el.textContent = stats[key];
  }
}

// Tasks: render everything as-is
function renderTasks() {
  const priorityEl = document.getElementById('priority-tasks');
  const scheduledEl = document.getElementById('scheduled-tasks');
  priorityEl.innerHTML = '';
  scheduledEl.innerHTML = '';

  (state.tasks || []).forEach(t => {
    const row = document.createElement('div');
    row.className = 'task-row';
    row.textContent = JSON.stringify(t); // show full raw object
    if (t.type === 'priority') priorityEl.appendChild(row);
    else scheduledEl.appendChild(row);
  });
}

// Projects: render everything as-is
function renderProjects() {
  const tb = document.getElementById('project-tbody');
  tb.innerHTML = '';
  (state.projects || []).forEach(p => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${JSON.stringify(p)}</td>`; // raw object in one cell
    tb.appendChild(tr);
  });
}

// Deliverables: render everything as-is
function renderDeliverables() {
  const tb = document.getElementById('deliverable-tbody');
  tb.innerHTML = '';
  (state.deliverables || []).forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${JSON.stringify(d)}</td>`; // raw object in one cell
    tb.appendChild(tr);
  });
}

// Notes: just show last note as-is
function renderNotes() {
  const notesEl = document.getElementById('daily-notes');
  const notes = state.notes || [];
  if (notes.length > 0) notesEl.value = JSON.stringify(notes[notes.length-1]);
}

// Save status
function showSaveStatus(status) {
  const el = document.getElementById('save-status');
  const msgs = { loading: '⏳ Loading…', loaded: '✅ Loaded', error: '⚠️ Load failed' };
  el.textContent = msgs[status] || '';
  el.className = 'save-status ' + status;
  if (status === 'loaded') setTimeout(() => { el.textContent=''; el.className='save-status'; }, 3000);
}

// Date
function setDate() {
  const d = new Date();
  const el = document.getElementById('topbar-date');
  if (el) el.textContent = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
}

// INITIAL LOAD
setDate();
loadFromSheet();
</script>

</body>
</html>
